<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>勉強時間管理アプリ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>📚 勉強時間管理</h1>
      <p class="today-date" id="todayDate"></p>
    </header>

    <main>
      <!-- タイマーセクション -->
      <section class="card timer-card">
        <div class="subject-input-group">
          <label for="subjectSelect">科目</label>
          <div class="subject-row">
            <select id="subjectSelect"></select>
            <button class="btn btn-secondary" id="manageSubjectsBtn">管理</button>
          </div>
        </div>

        <div class="subject-input-group">
          <label for="textbookSelect">参考書</label>
          <div class="subject-row">
            <select id="textbookSelect"></select>
            <button class="btn btn-secondary" id="manageTextbooksBtn">管理</button>
          </div>
        </div>

        <div class="timer-display" id="timerDisplay">00:00:00</div>

        <div class="timer-controls">
          <button class="btn btn-primary" id="startBtn">開始</button>
          <button class="btn btn-warning" id="pauseBtn" disabled>一時停止</button>
          <button class="btn btn-danger" id="stopBtn" disabled>終了</button>
        </div>

        <div class="session-note-group">
          <label for="sessionNote">メモ（任意）</label>
          <input type="text" id="sessionNote" placeholder="今日の学習内容..." />
        </div>
      </section>

      <!-- 今日の統計 -->
      <section class="card stats-card">
        <h2>今日の学習</h2>
        <div class="stats-grid" id="todayStats">
          <div class="stat-item">
            <span class="stat-label">合計時間</span>
            <span class="stat-value" id="totalTodayTime">0時間 0分</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">セッション数</span>
            <span class="stat-value" id="totalTodaySessions">0</span>
          </div>
        </div>
        <div class="subject-breakdown" id="subjectBreakdown"></div>
      </section>

      <!-- タブ切り替え -->
      <section class="card history-card">
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="history">履歴</button>
          <button class="tab-btn" data-tab="weekly">週間統計</button>
          <button class="tab-btn" data-tab="subjects">科目別</button>
        </div>

        <div class="tab-content" id="historyTab">
          <div id="sessionList"></div>
        </div>

        <div class="tab-content hidden" id="weeklyTab">
          <canvas id="weeklyChart" width="400" height="200"></canvas>
        </div>

        <div class="tab-content hidden" id="subjectsTab">
          <div id="allSubjectsStats"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- 科目管理モーダル -->
  <div class="modal-overlay hidden" id="subjectModal">
    <div class="modal">
      <h3>科目の管理</h3>
      <div class="modal-add-row">
        <input type="text" id="newSubjectInput" placeholder="新しい科目名" />
        <input type="color" id="newSubjectColor" value="#4f8ef7" />
        <button class="btn btn-primary" id="addSubjectBtn">追加</button>
      </div>
      <ul id="subjectList"></ul>
      <button class="btn btn-secondary modal-close" id="closeModalBtn">閉じる</button>
    </div>
  </div>

  <!-- 参考書管理モーダル -->
  <div class="modal-overlay hidden" id="textbookModal">
    <div class="modal">
      <h3>参考書の管理</h3>
      <div class="modal-add-row">
        <input type="text" id="newTextbookInput" placeholder="参考書名（例：財務会計テキストⅠ）" />
        <button class="btn btn-primary" id="addTextbookBtn">追加</button>
      </div>
      <ul id="textbookList"></ul>
      <button class="btn btn-secondary modal-close" id="closeTextbookModalBtn">閉じる</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
